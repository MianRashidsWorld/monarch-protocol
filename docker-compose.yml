services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
    restart: unless-stopped
    networks:
      - monarch

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: monarch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: monarch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monarch -d monarch"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - monarch

  studio:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx prisma studio --port 5555 --browser none
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://monarch:${POSTGRES_PASSWORD}@db:5432/monarch
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monarch

volumes:
  postgres_data:

networks:
  monarch:
    driver: bridge
